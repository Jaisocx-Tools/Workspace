<!DOCTYPE html>
<html>
  <head>

    <title>Table</title>

    <meta content="width=device-width, initial-scale=1.0" name="viewport">

    <link rel="stylesheet" href="packages/Table/assets/table-styles-main.css">

    <script src="packages/Table/build/Simple/Table.js"></script>


  </head>
  <body>
    <h1>Table</h1>
    <p>In development</p>

    <div>
      <button id="button-theme-base">Theme Base</button>
      <button id="button-theme-custom">Theme Custom</button>
    </div>

    <main>
      <div id="table_1"></div>
    </main>

    <script>
      let table = null;

      document.addEventListener('DOMContentLoaded', () => {
        table = new Table();
        table
          .setHtmlHolderNodeSelector ( "#table_1" )
          //.setCssClasses ( "theme-custom" )
          .setConfUrl ( "/packages/Table/assets/json/table-conf_records_3000.json" )
          .setDataUrl ( "/packages/Table/assets/json/table-records_3.json" )
          //.setMobileLookAndFeelMaxWidth ( 500 )
          .setMobileLookAndFeelMaxWidth ( 3 )
          .load();

        // setTimeout(
        //   () => {
        //     console.log (
        //       table.loadedTableData.slice ( 0, 3 )
        //     );
        //   },
        //   2000
        // );
        

        // this even handler is added in the document.DOMContentLoaded event,
        // since the html doocument is not parsed nor rendered by browser until this event,
        // and document.getElementbyId() could fail.
        // we can't rely just that the <script tag is set beforeend of the body html node.
        document.getElementById("button-theme-base").addEventListener(
          "click",
          ( evt ) => {
            document.querySelector( table.get )
            table.htmlHolderNode.className = "table";
          }
        );

        // this even handler is added in the document.DOMContentLoaded event,
        // since the html doocument is not parsed nor rendered by browser until this event,
        // and document.getElementbyId() could fail.
        // we can't rely just that the <script tag is set beforeend of the body html node.
        document.getElementById("button-theme-custom").addEventListener(
          "click",
          ( evt ) => {
            table.htmlHolderNode.className = "table theme-custom";
          }
        );

      });

    </script>
  </body>
</html>
