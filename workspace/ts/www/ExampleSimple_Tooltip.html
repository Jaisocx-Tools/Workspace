<html>
  <head>
    <title>Tooltip Example</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="packages/Tooltip/assets/themes/theme-darkmode/tooltip-theme-darkmode.css" />
    <link rel="stylesheet" href="packages/Tooltip/assets/tooltip-styles-main.css" />

    <style>
    .tooltip-show-button-holder {
      position: fixed;
      top: 5rem;
      left: 3rem;
    }

    button {
      display: block;
      margin: 5rem;
      padding: 0 5rem;
      line-height: 1.3rem;
      min-height: 3rem;
      height: fit-content;
      border: 1px solid blue;
      background-color: transparent;
      font-family: Verdana, Geneva, Tahoma, sans-serif;
      font-size: 1rem;
      outline: none;
      color: grey;
      position: relative;
    }

    button::before {
      content: '';
      display: block;
      line-height: 1.3rem;
      width: 2rem;
      height: inherit;
      min-height: inherit;
      position: absolute;
      top: 0;
      left: 1rem;
      background-image: url(examples/ExampleTooltip/media/mini-images/icons8-info-ios-17-outlined/icons8-info-50.png);
      background-repeat: no-repeat;
      background-size: contain;
      background-position: center;
    }

    </style>

    <script src="packages/EventEmitter/build/Simple/EventEmitter.js"></script>
    <script src="packages/EventEmitter/build/Simple/ImprovedRenderEventEmitter.js"></script>

    <script src="packages/TemplateRenderer/build/Simple/TemplateRenderer.js"></script>

    <script src="packages/Tooltip/build/Simple/Types.js"></script>
    <script src="packages/Tooltip/build/Simple/Constants.js"></script>
    <script src="packages/Tooltip/build/Simple/TooltipLib.js"></script>
    <script src="packages/Tooltip/build/Simple/Tooltip.js"></script>

    <!-- Produced by webpack bundle.js example -->
    <!-- <script src="examples/ExampleTooltip/build/webpack/bundle.js"></script> -->
  </head>
  <body>

    <h1>Tooltip Example</h1>

    <div class="tooltip-show-button-holder">
      <button id="tooltip-show-button-darkmode">Tooltip Theme Darkmode</button>
      <button id="tooltip-show-button">Tooltip Theme Base</button>
    </div>
 

    <script>
      document.addEventListener('DOMContentLoaded', () => {

        // const example = new ExampleTooltip();
        // example.addTooltip (
        //   "tooltip-show-button2",
        //   "theme-darkmode",
        //   "Hello World!"
        // );
        //return;

        const tooltipDarkmode = new Tooltip();
        tooltipDarkmode
          .setEventTargetHtmlNodeId( "tooltip-show-button-darkmode" )
          .setCssClasses( "theme-darkmode" )
          .setHtml ( "Hello World!" )
          .render();


        const tooltip = new Tooltip();
        tooltip
          .setDebug(true)
          .setEventTargetHtmlNodeId("tooltip-show-button")
          //.setCssClasses("theme-darkmode")
          .setTemplateData (
            {
              "html": "Hello World!",
            }
          )
          //.setHtml(`<p>Hello,</p><p>Have a nice day.</p>`) // styles are not working yet when height set small, and text bigger
          .setAlignDimensionOneValueOrder (
            [
              //Constants.AlignDimensionOne.BROWSER_TAB_BORDER_TOP,
              Constants.AlignDimensionOne.BROWSER_TAB_BORDER_RIGHT,
              Constants.AlignDimensionOne.BROWSER_TAB_BORDER_TOP,
              Constants.AlignDimensionOne.BROWSER_TAB_BORDER_LEFT,
              Constants.AlignDimensionOne.BROWSER_TAB_BORDER_BOTTOM,
            ]
          )
          .setTooltipAlignDimensionTwo(Constants.AlignDimensionTwo.EVENT_TARGET_MID)
          // .setTooltipAlignDimensionTwo(Constants.AlignDimensionTwo.EVENT_TARGET_START)
          // .setTooltipPaddingAlignDimensionTwo (
          //   20,
          //   Constants.CssSizeDim.PX
          // )
          .setArrowSize(0)
          .setArrowSizeDim("rem")
          .setIsWithArrow(1)
          .render();
        
        //tooltip.showTooltip();

      });
    </script>
  </body>
</html>
